<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime Tabs Lord</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="container">
<div class="tabs-info" id="tabsInfo">Tabs: <span id="tabCount">0</span></div>
<div class="speech-bubble" id="speechBubble"></div>
<div class="main-row">
<div class="settings-col">
<button id="openOptions" class="btn btn-settings">
<img src="icons/slime-settings.svg" class="btn-icon" alt="">
</button>
</div>
<div class="slime-col">
<div class="slime-outline" id="slimeOutline"></div>
<div class="slime" id="slime">
<div class="boss-glasses"><div class="glass"></div><div class="glass"></div></div>
<div class="eyes">
<div class="eye left"><div class="pupil"></div><div class="eyelid"></div></div>
<div class="eye right"><div class="pupil"></div><div class="eyelid"></div></div>
</div>
<div class="blush left"></div><div class="blush right"></div>
<div class="mouth"></div>
</div>
</div>
<div class="cubes-col">
<div class="tab-cubes" id="tabCubes"></div>
</div>
</div>
<div class="pages-wrapper">
<div class="pages-container" id="pagesContainer">
<div class="page" id="page1"></div>
<div class="page" id="page2"></div>
</div>
<div class="page-indicator">
<button class="page-dot active" data-page="1"></button>
<button class="page-dot" data-page="2"></button>
</div>
</div>
<div style="display:none;">
<button id="newTab" class="btn btn-new-tab"><img src="icons/slime-new-tab.svg" class="btn-icon" alt=""></button>
<button id="closeCurrent" class="btn btn-close-current"><img src="icons/slime-close-current.svg" class="btn-icon" alt=""></button>
<button id="closeRight" class="btn btn-warning"><img src="icons/slime-close-right.svg" class="btn-icon" alt=""></button>
<button id="closeOthers" class="btn btn-danger"><img src="icons/slime-close-other.svg" class="btn-icon" alt=""></button>
<button id="duplicateTab" class="btn btn-duplicate"><img src="icons/slime-duplicate-tab.svg" class="btn-icon" alt=""></button>
<button id="removeDuplicates" class="btn btn-remove-duplicates"><img src="icons/slime-close-duplicates.svg" class="btn-icon" alt=""></button>
<button id="pinUnpin" class="btn btn-pin"><img src="icons/slime-pin.svg" class="btn-icon" alt=""></button>
<button id="bookmarkAll" class="btn btn-bookmark"><img src="icons/slime-bookmark.svg" class="btn-icon" alt=""></button>
<button id="suspendTabs" class="btn btn-suspend"><img src="icons/slime-suspend.svg" class="btn-icon" alt=""></button>
<button id="muteTab" class="btn btn-mute"><img src="icons/slime-toggle-mute.svg" class="btn-icon" alt=""></button>
<button id="muteOthers" class="btn btn-mute-others"><img src="icons/slime-mute-others.svg" class="btn-icon" alt=""></button>
<button id="undoClose" class="btn btn-undo"><img src="icons/slime-undo-close.svg" class="btn-icon" alt=""></button>
</div>
</div>
<script type="module" src="popup.js"></script>
</body>
</html>
