<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime Tabs Lord</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="container">
<div class="tabs-info" id="tabsInfo">Tabs: <span id="tabCount">0</span></div>
<div class="speech-bubble" id="speechBubble"></div>
<div class="main-row">
<div class="settings-col">
<button id="openOptions" class="btn btn-settings">
<img src="icons/slime-settings.svg" class="btn-icon" alt="">
</button>
</div>
<div class="slime-col">
<div class="slime-outline" id="slimeOutline"></div>
<div class="slime" id="slime">
<div class="boss-glasses"><div class="glass"></div><div class="glass"></div></div>
<div class="eyes">
<div class="eye left"><div class="pupil"></div><div class="eyelid"></div></div>
<div class="eye right"><div class="pupil"></div><div class="eyelid"></div></div>
</div>
<div class="blush left"></div><div class="blush right"></div>
<div class="mouth"></div>
</div>
</div>
<div class="cubes-col">
<div class="tab-cubes" id="tabCubes"></div>
</div>
</div>
<div class="button-row">
<button id="undoClose" class="btn btn-undo">
<img src="icons/slime-undo-close.svg" class="btn-icon" alt="">
</button>
<button id="duplicateTab" class="btn btn-duplicate">
<img src="icons/slime-duplicate-tab.svg" class="btn-icon" alt="">
</button>
<button id="muteTab" class="btn btn-mute">
<img src="icons/slime-toggle-mute.svg" class="btn-icon" alt="">
</button>
</div>
<div class="button-row">
<button id="closeOthers" class="btn btn-danger">
<img src="icons/slime-close-other.svg" class="btn-icon" alt="">
</button>
<button id="closeRight" class="btn btn-warning">
<img src="icons/slime-close-right.svg" class="btn-icon" alt="">
</button>
<button id="removeDuplicates" class="btn btn-remove-duplicates">
<img src="icons/slime-close-duplicates.svg" class="btn-icon" alt="">
</button>
</div>
</div>
<script type="module" src="popup.js"></script>
</body>
</html>
